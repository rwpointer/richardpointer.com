<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RP · Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0f12;
      --surface: #141720;
      --surface2: #1c2030;
      --border: #252a38;
      --text: #dde4f0;
      --muted: #6b7591;
      --accent: #4f8ef7;
      --green: #3dd68c;
      --red: #f75959;
      --amber: #f7a840;
      --purple: #a78bfa;
      --teal: #34d1bf;
      --font-mono: 'IBM Plex Mono', monospace;
      --font-sans: 'IBM Plex Sans', sans-serif;
    }

    html { font-size: 14px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-sans);
      min-height: 100vh;
    }

    /* ── Lock Screen ─────────────────────────────────────── */
    #lock-screen {
      position: fixed; inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      flex-direction: column;
      gap: 24px;
    }

    #lock-screen.hidden { display: none; }

    .lock-logo {
      font-family: var(--font-mono);
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .lock-title {
      font-size: 1.8rem;
      font-weight: 300;
      letter-spacing: -0.02em;
      color: var(--text);
    }

    .lock-form {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 280px;
    }

    .lock-input {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 1rem;
      padding: 12px 16px;
      border-radius: 6px;
      outline: none;
      text-align: center;
      letter-spacing: 0.15em;
      transition: border-color 0.2s;
    }

    .lock-input:focus { border-color: var(--accent); }

    .lock-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 12px;
      border-radius: 6px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .lock-btn:hover { opacity: 0.85; }

    .lock-error {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--red);
      text-align: center;
      min-height: 16px;
      letter-spacing: 0.05em;
    }

    /* ── App Layout ──────────────────────────────────────── */
    #app { display: none; min-height: 100vh; }
    #app.visible { display: flex; flex-direction: column; }

    /* Top bar */
    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .topbar-logo {
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .topbar-date {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
    }

    .tab-nav {
      display: flex;
      gap: 2px;
    }

    .tab-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 4px;
      transition: all 0.15s;
    }

    .tab-btn:hover { color: var(--text); background: var(--surface2); }
    .tab-btn.active { color: var(--accent); background: rgba(79,142,247,0.1); }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .lock-icon-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.65rem;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      letter-spacing: 0.08em;
    }

    .lock-icon-btn:hover { color: var(--text); border-color: var(--muted); }

    /* ── Content Area ────────────────────────────────────── */
    .content {
      flex: 1;
      padding: 28px 28px 60px;
      max-width: 1200px;
      margin: 0 auto;
      width: 100%;
    }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── Shared Components ───────────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .panel-header {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .panel-title {
      font-family: var(--font-mono);
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--muted);
    }

    .badge {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 10px;
      letter-spacing: 0.06em;
    }

    .badge-green { background: rgba(61,214,140,0.15); color: var(--green); }
    .badge-red   { background: rgba(247,89,89,0.15);  color: var(--red); }
    .badge-amber { background: rgba(247,168,64,0.15); color: var(--amber); }
    .badge-blue  { background: rgba(79,142,247,0.15); color: var(--accent); }
    .badge-purple{ background: rgba(167,139,250,0.15);color: var(--purple); }

    .btn {
      font-family: var(--font-mono);
      font-size: 0.65rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 13px;
      border-radius: 5px;
      cursor: pointer;
      border: none;
      transition: all 0.15s;
    }

    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { opacity: 0.85; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--muted); }
    .btn-ghost:hover { border-color: var(--muted); color: var(--text); }
    .btn-danger { background: transparent; border: 1px solid transparent; color: var(--muted); }
    .btn-danger:hover { color: var(--red); }

    /* Add form (shared inline pattern) */
    .add-form {
      padding: 14px 18px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
      display: none;
    }

    .add-form.open { display: block; }

    .form-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: flex-end;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 120px;
    }

    .form-label {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }

    .form-input, .form-select, .form-textarea {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.85rem;
      padding: 7px 10px;
      border-radius: 5px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-textarea {
      font-family: var(--font-sans);
      resize: vertical;
      min-height: 60px;
      width: 100%;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: var(--accent);
    }

    .form-select option { background: var(--surface); }

    /* Empty state */
    .empty-state {
      padding: 40px 18px;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    /* ═══════════════════════════════════════════
       TAB 1: OVERVIEW / STATS
    ═══════════════════════════════════════════ */
    .overview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
    }

    .stat-card.green::after  { background: var(--green); }
    .stat-card.blue::after   { background: var(--accent); }
    .stat-card.amber::after  { background: var(--amber); }
    .stat-card.purple::after { background: var(--purple); }
    .stat-card.teal::after   { background: var(--teal); }

    .stat-label {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-size: 2rem;
      font-weight: 600;
      line-height: 1;
      letter-spacing: -0.03em;
    }

    .stat-sub {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--muted);
      margin-top: 6px;
    }

    /* News relevance chart */
    .mini-chart {
      display: flex;
      gap: 4px;
      align-items: flex-end;
      height: 50px;
      padding: 14px 18px 10px;
    }

    .bar {
      flex: 1;
      background: var(--border);
      border-radius: 2px 2px 0 0;
      position: relative;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .bar:hover { opacity: 0.8; }
    .bar-fill { border-radius: 2px 2px 0 0; transition: height 0.4s ease; }
    .bar .bar-label {
      position: absolute;
      bottom: -18px;
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--font-mono);
      font-size: 0.55rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ═══════════════════════════════════════════
       TAB 2: NEWS
    ═══════════════════════════════════════════ */
    .news-item {
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: start;
      transition: background 0.15s;
    }

    .news-item:last-child { border-bottom: none; }
    .news-item:hover { background: var(--surface2); }

    .news-headline {
      font-size: 0.92rem;
      font-weight: 500;
      margin-bottom: 3px;
      line-height: 1.35;
    }

    .news-meta {
      display: flex;
      gap: 10px;
      align-items: center;
      font-family: var(--font-mono);
      font-size: 0.62rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .news-notes {
      margin-top: 6px;
      font-size: 0.8rem;
      color: var(--muted);
      font-style: italic;
      line-height: 1.4;
    }

    .news-actions {
      display: flex;
      flex-direction: column;
      gap: 5px;
      align-items: flex-end;
    }

    .relevance-btn {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 9px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .relevance-btn.useful  { border-color: var(--green);  color: var(--green); }
    .relevance-btn.useless { border-color: var(--red);    color: var(--red); }
    .relevance-btn.pending { border-color: var(--border); color: var(--muted); }
    .relevance-btn.useful.active  { background: rgba(61,214,140,0.15); }
    .relevance-btn.useless.active { background: rgba(247,89,89,0.15); }

    .filter-row {
      display: flex;
      gap: 6px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--surface2);
    }

    .filter-btn {
      font-family: var(--font-mono);
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 4px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .filter-btn:hover { color: var(--text); border-color: var(--muted); }
    .filter-btn.active { color: var(--accent); border-color: var(--accent); background: rgba(79,142,247,0.08); }

    /* ═══════════════════════════════════════════
       TAB 3: TASKS
    ═══════════════════════════════════════════ */
    .task-item {
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      transition: background 0.15s;
    }

    .task-item:last-child { border-bottom: none; }
    .task-item:hover { background: var(--surface2); }
    .task-item.done { opacity: 0.45; }
    .task-item.done .task-text { text-decoration: line-through; color: var(--muted); }

    .task-check {
      width: 16px; height: 16px;
      flex-shrink: 0;
      border: 1.5px solid var(--border);
      border-radius: 3px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .task-check:hover { border-color: var(--green); }
    .task-item.done .task-check { background: var(--green); border-color: var(--green); }
    .task-item.done .task-check::after { content: '✓'; font-size: 0.65rem; color: var(--bg); font-weight: 700; }

    .task-content { flex: 1; }

    .task-text {
      font-size: 0.88rem;
      line-height: 1.3;
    }

    .task-sub {
      display: flex;
      gap: 10px;
      margin-top: 3px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
      flex-wrap: wrap;
    }

    .priority-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .priority-dot.high   { background: var(--red); }
    .priority-dot.medium { background: var(--amber); }
    .priority-dot.low    { background: var(--green); }

    /* ═══════════════════════════════════════════
       TAB 4: BILLS
    ═══════════════════════════════════════════ */
    .bills-summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .bill-item {
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 14px;
      transition: background 0.15s;
    }

    .bill-item:last-child { border-bottom: none; }
    .bill-item:hover { background: var(--surface2); }

    .bill-icon {
      width: 32px; height: 32px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .bill-content { flex: 1; }

    .bill-name {
      font-size: 0.88rem;
      font-weight: 500;
      margin-bottom: 2px;
    }

    .bill-meta {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
    }

    .bill-right {
      text-align: right;
    }

    .bill-amount {
      font-family: var(--font-mono);
      font-size: 0.95rem;
      font-weight: 600;
    }

    .bill-due {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .bill-due.overdue { color: var(--red); }
    .bill-due.soon    { color: var(--amber); }

    .paid-btn {
      font-family: var(--font-mono);
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 4px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: none;
      color: var(--muted);
      transition: all 0.15s;
      margin-top: 4px;
    }

    .paid-btn:hover { border-color: var(--green); color: var(--green); }
    .paid-btn.paid { border-color: var(--green); color: var(--green); background: rgba(61,214,140,0.1); }

    /* ═══════════════════════════════════════════
       TAB 5: PLANS
    ═══════════════════════════════════════════ */
    .plan-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 16px;
      overflow: hidden;
    }

    .plan-header {
      padding: 16px 18px;
      display: flex;
      align-items: flex-start;
      gap: 14px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .plan-header:hover { background: var(--surface2); }

    .plan-color {
      width: 3px;
      align-self: stretch;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .plan-main { flex: 1; }

    .plan-name {
      font-size: 1rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .plan-desc {
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.45;
    }

    .plan-meta {
      display: flex;
      gap: 12px;
      margin-top: 8px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
    }

    .plan-progress-bar {
      height: 3px;
      background: var(--border);
      margin: 0 18px 16px;
    }

    .plan-progress-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .plan-todos {
      padding: 0 18px 14px;
      display: none;
    }

    .plan-todos.open { display: block; }

    .plan-todo-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid var(--border);
    }

    .plan-todo-item:last-child { border-bottom: none; }

    .plan-todo-check {
      width: 14px; height: 14px;
      border: 1.5px solid var(--border);
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
    }

    .plan-todo-check:hover { border-color: var(--green); }
    .plan-todo-item.done .plan-todo-check { background: var(--green); border-color: var(--green); }
    .plan-todo-item.done .plan-todo-check::after { content: '✓'; font-size: 0.55rem; color: var(--bg); }
    .plan-todo-item.done .plan-todo-text { text-decoration: line-through; color: var(--muted); opacity: 0.7; }

    .plan-todo-text { font-size: 0.85rem; flex: 1; }

    .plan-todo-add {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .plan-todo-input {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 0.82rem;
      padding: 6px 10px;
      border-radius: 5px;
      outline: none;
    }

    .plan-todo-input:focus { border-color: var(--accent); }

    .plan-toggle {
      font-family: var(--font-mono);
      font-size: 0.6rem;
      color: var(--muted);
      padding: 3px 8px;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      background: none;
      transition: all 0.15s;
      white-space: nowrap;
    }

    .plan-toggle:hover { color: var(--text); border-color: var(--muted); }

    /* ═══════════════════════════════════════════
       MISC
    ═══════════════════════════════════════════ */
    .section-row {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    @media (max-width: 900px) {
      .section-row { grid-template-columns: 1fr; }
      .bills-summary { grid-template-columns: 1fr; }
      .overview-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 560px) {
      .tab-nav { display: none; }
      .mobile-nav {
        display: flex;
        overflow-x: auto;
        gap: 2px;
        padding: 8px 12px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }
      .overview-grid { grid-template-columns: 1fr; }
    }

    .mobile-nav { display: none; }

    /* Animations */
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .tab-panel.active { animation: slideIn 0.2s ease both; }

    /* Delete btn inline */
    .del-btn {
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 0.8rem;
      padding: 2px 6px;
      border-radius: 3px;
      line-height: 1;
      opacity: 0;
      transition: all 0.15s;
    }

<script>
// ══════════════════════════════════════════════
//  CONFIGURATION — change password here
// ══════════════════════════════════════════════
// Default password is: pointer2026
// To change: update the hash below by computing SHA-256 of your new password
// You can compute it at: https://emn178.github.io/online-tools/sha256.html
const PASS_HASH = 'a4e2f5b8c9d3e7f1a0b2c4d6e8f0a1b3c5d7e9f2a4b6c8d0e2f4a6b8c0d2e4f6'; // placeholder

// Simple hash function for client-side use (not cryptographic)
async function sha256(str) {
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
}

// For simplicity, use a plaintext comparison (store password as plain but hashed in session)
// The ACTUAL password is stored as a SHA-256 hash constant at top of script
// Default password: pointer2026 — CHANGE THIS before deploying
const ACTUAL_PASSWORD = 'pointer2026'; // CHANGE THIS

function tryUnlock() {
  const input = document.getElementById('pw-input').value;
  const err = document.getElementById('pw-error');
  if (input === ACTUAL_PASSWORD) {
    sessionStorage.setItem('rp_auth', '1');
    document.getElementById('lock-screen').classList.add('hidden');
    document.getElementById('app').classList.add('visible');
    initApp();
  } else {
    err.textContent = 'Incorrect password.';
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-input').focus();
    setTimeout(() => err.textContent = '', 2000);
  }
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryUnlock();
});

function lockApp() {
  sessionStorage.removeItem('rp_auth');
  document.getElementById('lock-screen').classList.remove('hidden');
  document.getElementById('app').classList.remove('visible');
  document.getElementById('pw-input').value = '';
  document.getElementById('pw-input').focus();
}

// Check if already authenticated this session
if (sessionStorage.getItem('rp_auth') === '1') {
  document.getElementById('lock-screen').classList.add('hidden');
  document.getElementById('app').classList.add('visible');
  window.addEventListener('DOMContentLoaded', initApp);
}

// ══════════════════════════════════════════════
//  DATA LAYER
// ══════════════════════════════════════════════
function loadData() {
  return {
    news:  JSON.parse(localStorage.getItem('rp_news')  || '[]'),
    tasks: JSON.parse(localStorage.getItem('rp_tasks') || '[]'),
    bills: JSON.parse(localStorage.getItem('rp_bills') || '[]'),
    plans: JSON.parse(localStorage.getItem('rp_plans') || '[]'),
  };
}

function saveData(key, arr) {
  localStorage.setItem('rp_' + key, JSON.stringify(arr));
}

function genId() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}

// ══════════════════════════════════════════════
//  TAB NAVIGATION
// ══════════════════════════════════════════════
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  document.querySelectorAll('.tab-btn').forEach(b => {
    if (b.textContent.trim().toLowerCase() === name || b.onclick.toString().includes(`'${name}'`)) {
      b.classList.add('active');
    }
  });
  if (btn) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  renderAll();
}

function toggleAddForm(id) {
  const el = document.getElementById(id);
  el.classList.toggle('open');
}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
function initApp() {
  // Date display
  const now = new Date();
  document.getElementById('topbar-date').textContent =
    now.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });

  renderAll();
}

function renderAll() {
  renderOverview();
  renderNews();
  renderTasks();
  renderBills();
  renderPlans();
}

// ══════════════════════════════════════════════
//  OVERVIEW
// ══════════════════════════════════════════════
function renderOverview() {
  const { news, tasks, bills, plans } = loadData();
  const now = new Date();

  const pendingTasks = tasks.filter(t => !t.done);
  const usefulNews   = news.filter(n => n.relevance === 'useful').length;
  const uselessNews  = news.filter(n => n.relevance === 'useless').length;
  const totalBills   = bills.reduce((s,b) => s + Number(b.amount), 0);
  const plansDone    = plans.filter(p => (p.todos||[]).length > 0 && (p.todos||[]).every(t => t.done)).length;
  const overdueBills = bills.filter(b => {
    const day = parseInt(b.dueDay);
    return day < now.getDate() && b.frequency === 'Monthly' && !b.paidThisMonth;
  }).length;

  const stats = document.getElementById('overview-stats');
  stats.innerHTML = `
    <div class="stat-card blue">
      <div class="stat-label">Pending Tasks</div>
      <div class="stat-value" style="color:var(--accent)">${pendingTasks.length}</div>
      <div class="stat-sub">of ${tasks.length} total</div>
    </div>
    <div class="stat-card green">
      <div class="stat-label">Useful News</div>
      <div class="stat-value" style="color:var(--green)">${usefulNews}</div>
      <div class="stat-sub">${uselessNews} marked useless</div>
    </div>
    <div class="stat-card amber">
      <div class="stat-label">Monthly Bills</div>
      <div class="stat-value" style="color:var(--amber)">$${totalBills.toLocaleString('en-US',{maximumFractionDigits:0})}</div>
      <div class="stat-sub">${overdueBills > 0 ? overdueBills + ' overdue' : 'all current'}</div>
    </div>
    <div class="stat-card purple">
      <div class="stat-label">Active Plans</div>
      <div class="stat-value" style="color:var(--purple)">${plans.length}</div>
      <div class="stat-sub">${plansDone} completed</div>
    </div>
  `;

  // Overview tasks
  const otl = document.getElementById('overview-tasks-list');
  const upcoming = tasks.filter(t => !t.done).slice(0,5);
  if (upcoming.length === 0) {
    otl.innerHTML = '<div class="empty-state">No pending tasks</div>';
  } else {
    otl.innerHTML = upcoming.map(t => `
      <div class="task-item ${t.done?'done':''}">
        <div class="priority-dot ${t.priority}"></div>
        <div class="task-content">
          <div class="task-text">${esc(t.text)}</div>
          <div class="task-sub">
            ${t.category ? `<span>${esc(t.category)}</span>` : ''}
            ${t.due ? `<span>Due ${t.due}</span>` : ''}
          </div>
        </div>
      </div>
    `).join('');
  }

  // Overview bills
  const obl = document.getElementById('overview-bills-list');
  const sortedBills = [...bills].sort((a,b) => a.dueDay - b.dueDay).slice(0,5);
  if (sortedBills.length === 0) {
    obl.innerHTML = '<div class="empty-state">No bills tracked</div>';
  } else {
    obl.innerHTML = sortedBills.map(b => {
      const dueIn = parseInt(b.dueDay) - now.getDate();
      const cls = dueIn < 0 ? 'overdue' : dueIn <= 3 ? 'soon' : '';
      return `
        <div class="bill-item" style="padding:9px 14px;">
          <div class="bill-content">
            <div class="bill-name" style="font-size:0.82rem;">${esc(b.name)}</div>
            <div class="bill-meta">Day ${b.dueDay}</div>
          </div>
          <div class="bill-right">
            <div class="bill-amount" style="font-size:0.82rem;">$${Number(b.amount).toLocaleString()}</div>
            ${cls ? `<div class="bill-due ${cls}">${cls === 'overdue' ? 'OVERDUE' : `in ${dueIn}d`}</div>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  // Relevance chart
  renderRelevanceChart(news);
}

function renderRelevanceChart(news) {
  const chart = document.getElementById('relevance-chart');
  const badge = document.getElementById('total-news-badge');
  badge.textContent = news.length + ' item' + (news.length !== 1 ? 's' : '');

  // Build weekly buckets (last 8 weeks)
  const buckets = [];
  for (let i = 7; i >= 0; i--) {
    const d = new Date();
    d.setDate(d.getDate() - i * 7);
    const label = (d.getMonth()+1) + '/' + d.getDate();
    const weekNews = news.filter(n => {
      const nd = new Date(n.date);
      const diff = (new Date() - nd) / (1000*60*60*24);
      return diff >= i*7 && diff < (i+1)*7;
    });
    buckets.push({
      label,
      useful:  weekNews.filter(n => n.relevance === 'useful').length,
      useless: weekNews.filter(n => n.relevance === 'useless').length,
      pending: weekNews.filter(n => n.relevance === 'pending').length,
    });
  }

  const maxVal = Math.max(...buckets.map(b => b.useful + b.useless + b.pending), 1);

  chart.innerHTML = buckets.map(b => {
    const total = b.useful + b.useless + b.pending;
    const pct = (total / maxVal) * 100;
    const usefulPct = total ? (b.useful / total) * 100 : 0;
    return `
      <div class="bar" style="flex:1;background:var(--border);border-radius:2px 2px 0 0;position:relative;min-height:4px;display:flex;flex-direction:column;justify-content:flex-end;" title="${b.label}: ${b.useful} useful, ${b.useless} useless">
        <div class="bar-fill" style="height:${pct}%;background:linear-gradient(to top, var(--green) ${usefulPct}%, var(--red) ${usefulPct}%);border-radius:2px 2px 0 0;"></div>
        <div class="bar-label">${b.label}</div>
      </div>
    `;
  }).join('');
}

// ══════════════════════════════════════════════
//  NEWS
// ══════════════════════════════════════════════
let newsFilter = 'all';

function filterNews(f, btn) {
  newsFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderNews();
}

function renderNews() {
  const { news } = loadData();
  const filtered = newsFilter === 'all' ? news : news.filter(n => n.relevance === newsFilter);
  const list = document.getElementById('news-list');

  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">No news items' + (newsFilter !== 'all' ? ' in this category' : '') + '</div>';
    return;
  }

  list.innerHTML = [...filtered].reverse().map(item => `
    <div class="news-item">
      <div>
        <div class="news-headline">${esc(item.title)}</div>
        <div class="news-meta">
          ${item.source ? `<span>${esc(item.source)}</span><span>·</span>` : ''}
          <span>${item.category}</span>
          <span>·</span>
          <span>${fmtDate(item.date)}</span>
        </div>
        ${item.notes ? `<div class="news-notes">${esc(item.notes)}</div>` : ''}
      </div>
      <div class="news-actions">
        <button class="relevance-btn useful ${item.relevance==='useful'?'active':''}" onclick="setRelevance('${item.id}','useful')">Useful</button>
        <button class="relevance-btn useless ${item.relevance==='useless'?'active':''}" onclick="setRelevance('${item.id}','useless')">Useless</button>
        <button class="del-btn" onclick="deleteItem('news','${item.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

function addNews() {
  const title = document.getElementById('news-title').value.trim();
  if (!title) return;
  const { news } = loadData();
  news.push({
    id: genId(),
    title,
    source: document.getElementById('news-source').value.trim(),
    category: document.getElementById('news-category').value,
    notes: document.getElementById('news-notes').value.trim(),
    relevance: 'pending',
    date: new Date().toISOString(),
  });
  saveData('news', news);
  document.getElementById('news-title').value = '';
  document.getElementById('news-source').value = '';
  document.getElementById('news-notes').value = '';
  toggleAddForm('news-form');
  renderNews();
  renderOverview();
}

function setRelevance(id, val) {
  const { news } = loadData();
  const item = news.find(n => n.id === id);
  if (item) item.relevance = item.relevance === val ? 'pending' : val;
  saveData('news', news);
  renderNews();
  renderOverview();
}

// ══════════════════════════════════════════════
//  TASKS
// ══════════════════════════════════════════════
function renderTasks() {
  const { tasks } = loadData();
  const list = document.getElementById('task-list');
  const sorted = [...tasks].sort((a,b) => {
    const p = { high:0, medium:1, low:2 };
    if (a.done !== b.done) return a.done ? 1 : -1;
    return p[a.priority] - p[b.priority];
  });

  if (tasks.length === 0) {
    list.innerHTML = '<div class="empty-state">No tasks yet</div>';
    return;
  }

  list.innerHTML = sorted.map(t => `
    <div class="task-item ${t.done?'done':''}">
      <div class="priority-dot ${t.priority}"></div>
      <div class="task-check" onclick="toggleTask('${t.id}')"></div>
      <div class="task-content">
        <div class="task-text">${esc(t.text)}</div>
        <div class="task-sub">
          ${t.category ? `<span>${esc(t.category)}</span>` : ''}
          ${t.priority  ? `<span>${t.priority}</span>` : ''}
          ${t.due       ? `<span>Due ${t.due}</span>` : ''}
          ${t.done && t.completedAt ? `<span>Done ${fmtDate(t.completedAt)}</span>` : ''}
        </div>
      </div>
      <button class="del-btn" onclick="deleteItem('tasks','${t.id}')">✕</button>
    </div>
  `).join('');
}

function addTask() {
  const text = document.getElementById('task-text').value.trim();
  if (!text) return;
  const { tasks } = loadData();
  tasks.push({
    id: genId(),
    text,
    priority: document.getElementById('task-priority').value,
    category: document.getElementById('task-category').value,
    due: document.getElementById('task-due').value,
    done: false,
    createdAt: new Date().toISOString(),
  });
  saveData('tasks', tasks);
  document.getElementById('task-text').value = '';
  document.getElementById('task-due').value = '';
  toggleAddForm('task-form');
  renderTasks();
  renderOverview();
}

function toggleTask(id) {
  const { tasks } = loadData();
  const t = tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; t.completedAt = t.done ? new Date().toISOString() : null; }
  saveData('tasks', tasks);
  renderTasks();
  renderOverview();
}

// ══════════════════════════════════════════════
//  BILLS
// ══════════════════════════════════════════════
const BILL_ICONS = { Housing:'🏠', Utilities:'⚡', Insurance:'🛡️', Subscriptions:'🔄', 'Rental Property':'🏢', Other:'💳' };
const BILL_COLORS = { Housing:'rgba(79,142,247,0.15)', Utilities:'rgba(247,168,64,0.15)', Insurance:'rgba(61,214,140,0.15)', Subscriptions:'rgba(167,139,250,0.15)', 'Rental Property':'rgba(52,209,191,0.15)', Other:'rgba(107,117,145,0.15)' };

function renderBills() {
  const { bills } = loadData();
  const now = new Date();
  const list = document.getElementById('bill-list');
  const summary = document.getElementById('bills-summary-cards');

  if (bills.length === 0) {
    list.innerHTML = '<div class="empty-state">No bills tracked yet</div>';
    summary.innerHTML = '';
    return;
  }

  const monthly = bills.filter(b => b.frequency === 'Monthly').reduce((s,b) => s + Number(b.amount), 0);
  const annual  = bills.reduce((s,b) => {
    const m = b.frequency === 'Monthly' ? 12 : b.frequency === 'Quarterly' ? 4 : 1;
    return s + Number(b.amount) * m;
  }, 0);
  const unpaid = bills.filter(b => !b.paidThisMonth).length;

  summary.innerHTML = `
    <div class="stat-card amber">
      <div class="stat-label">Monthly Total</div>
      <div class="stat-value" style="color:var(--amber);font-size:1.5rem;">$${monthly.toLocaleString('en-US',{maximumFractionDigits:0})}</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-label">Annual Total</div>
      <div class="stat-value" style="color:var(--accent);font-size:1.5rem;">$${annual.toLocaleString('en-US',{maximumFractionDigits:0})}</div>
    </div>
    <div class="stat-card ${unpaid > 0 ? 'red' : 'green'}">
      <div class="stat-label">Unpaid This Month</div>
      <div class="stat-value" style="color:${unpaid > 0 ? 'var(--red)' : 'var(--green)'};font-size:1.5rem;">${unpaid}</div>
    </div>
  `;

  const sorted = [...bills].sort((a,b) => a.dueDay - b.dueDay);
  list.innerHTML = sorted.map(b => {
    const dueIn = parseInt(b.dueDay) - now.getDate();
    const cls = dueIn < 0 ? 'overdue' : dueIn <= 3 ? 'soon' : '';
    const icon = BILL_ICONS[b.category] || '💳';
    const bg = BILL_COLORS[b.category] || 'rgba(107,117,145,0.15)';
    return `
      <div class="bill-item">
        <div class="bill-icon" style="background:${bg}">${icon}</div>
        <div class="bill-content">
          <div class="bill-name">${esc(b.name)}</div>
          <div class="bill-meta">${b.category} · ${b.frequency}</div>
        </div>
        <div class="bill-right">
          <div class="bill-amount">$${Number(b.amount).toLocaleString()}</div>
          <div class="bill-due ${cls}">
            ${cls === 'overdue' ? 'OVERDUE' : cls === 'soon' ? `Due in ${dueIn}d` : `Due day ${b.dueDay}`}
          </div>
          <button class="paid-btn ${b.paidThisMonth?'paid':''}" onclick="togglePaid('${b.id}')">
            ${b.paidThisMonth ? '✓ Paid' : 'Mark Paid'}
          </button>
        </div>
        <button class="del-btn" onclick="deleteItem('bills','${b.id}')">✕</button>
      </div>
    `;
  }).join('');
}

function addBill() {
  const name = document.getElementById('bill-name').value.trim();
  const amount = document.getElementById('bill-amount').value;
  if (!name || !amount) return;
  const { bills } = loadData();
  bills.push({
    id: genId(),
    name,
    amount: parseFloat(amount),
    dueDay: document.getElementById('bill-due-day').value || '1',
    frequency: document.getElementById('bill-frequency').value,
    category: document.getElementById('bill-category').value,
    paidThisMonth: false,
  });
  saveData('bills', bills);
  document.getElementById('bill-name').value = '';
  document.getElementById('bill-amount').value = '';
  document.getElementById('bill-due-day').value = '';
  toggleAddForm('bill-form');
  renderBills();
  renderOverview();
}

function togglePaid(id) {
  const { bills } = loadData();
  const b = bills.find(b => b.id === id);
  if (b) b.paidThisMonth = !b.paidThisMonth;
  saveData('bills', bills);
  renderBills();
  renderOverview();
}

// ══════════════════════════════════════════════
//  PLANS
// ══════════════════════════════════════════════
function renderPlans() {
  const { plans } = loadData();
  const list = document.getElementById('plans-list');

  if (plans.length === 0) {
    list.innerHTML = '<div class="panel"><div class="empty-state">No long-term plans yet. Add one below.</div></div>';
    return;
  }

  list.innerHTML = plans.map((p, pi) => {
    const todos = p.todos || [];
    const done = todos.filter(t => t.done).length;
    const pct = todos.length ? Math.round((done / todos.length) * 100) : 0;
    const isOpen = p._open;

    return `
      <div class="plan-card" id="plan-${p.id}">
        <div class="plan-header" onclick="togglePlan('${p.id}')">
          <div class="plan-color" style="background:${p.color}"></div>
          <div class="plan-main">
            <div class="plan-name">${esc(p.name)}</div>
            <div class="plan-desc">${esc(p.desc || '')}</div>
            <div class="plan-meta">
              ${p.target ? `<span>Target: ${p.target}</span>` : ''}
              <span>${done}/${todos.length} todos complete</span>
              ${pct > 0 ? `<span>${pct}%</span>` : ''}
            </div>
          </div>
          <button class="plan-toggle" onclick="event.stopPropagation();togglePlan('${p.id}')">${isOpen ? 'Collapse' : 'Expand'}</button>
          <button class="del-btn" style="opacity:1;margin-left:4px;" onclick="event.stopPropagation();deleteItem('plans','${p.id}')">✕</button>
        </div>
        ${todos.length > 0 ? `
          <div class="plan-progress-bar">
            <div class="plan-progress-fill" style="width:${pct}%;background:${p.color}"></div>
          </div>
        ` : ''}
        <div class="plan-todos ${isOpen ? 'open' : ''}" id="todos-${p.id}">
          ${todos.map(t => `
            <div class="plan-todo-item ${t.done?'done':''}" id="todo-${t.id}">
              <div class="plan-todo-check" onclick="togglePlanTodo('${p.id}','${t.id}')"></div>
              <div class="plan-todo-text">${esc(t.text)}</div>
              <button class="del-btn" style="opacity:1;font-size:0.7rem;" onclick="deletePlanTodo('${p.id}','${t.id}')">✕</button>
            </div>
          `).join('')}
          <div class="plan-todo-add">
            <input type="text" class="plan-todo-input" id="todo-input-${p.id}" placeholder="Add todo item..." onkeydown="if(event.key==='Enter') addPlanTodo('${p.id}')">
            <button class="btn btn-primary" onclick="addPlanTodo('${p.id}')">Add</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function addPlan() {
  const name = document.getElementById('plan-name').value.trim();
  if (!name) return;
  const { plans } = loadData();
  plans.push({
    id: genId(),
    name,
    desc: document.getElementById('plan-desc').value.trim(),
    target: document.getElementById('plan-target').value,
    color: document.getElementById('plan-color').value,
    todos: [],
    _open: true,
    createdAt: new Date().toISOString(),
  });
  saveData('plans', plans);
  document.getElementById('plan-name').value = '';
  document.getElementById('plan-desc').value = '';
  document.getElementById('plan-target').value = '';
  toggleAddForm('plan-form');
  renderPlans();
}

function togglePlan(id) {
  const { plans } = loadData();
  const p = plans.find(p => p.id === id);
  if (p) p._open = !p._open;
  saveData('plans', plans);
  renderPlans();
}

function addPlanTodo(planId) {
  const input = document.getElementById('todo-input-' + planId);
  const text = input.value.trim();
  if (!text) return;
  const { plans } = loadData();
  const p = plans.find(p => p.id === planId);
  if (!p) return;
  if (!p.todos) p.todos = [];
  p.todos.push({ id: genId(), text, done: false });
  saveData('plans', plans);
  renderPlans();
  // Re-focus
  setTimeout(() => {
    const el = document.getElementById('todo-input-' + planId);
    if (el) el.focus();
  }, 50);
}

function togglePlanTodo(planId, todoId) {
  const { plans } = loadData();
  const p = plans.find(p => p.id === planId);
  if (!p) return;
  const t = (p.todos||[]).find(t => t.id === todoId);
  if (t) t.done = !t.done;
  saveData('plans', plans);
  renderPlans();
}

function deletePlanTodo(planId, todoId) {
  const { plans } = loadData();
  const p = plans.find(p => p.id === planId);
  if (!p) return;
  p.todos = (p.todos||[]).filter(t => t.id !== todoId);
  saveData('plans', plans);
  renderPlans();
}

// ══════════════════════════════════════════════
//  SHARED
// ══════════════════════════════════════════════
function deleteItem(key, id) {
  const data = loadData();
  const arr = data[key].filter(i => i.id !== id);
  saveData(key, arr);
  renderAll();
}

function esc(str) {
  if (!str) return '';
  return String(str)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

// Auto-reset bill "paid" status monthly
function checkMonthlyReset() {
  const key = 'rp_last_reset';
  const lastReset = localStorage.getItem(key);
  const now = new Date();
  const monthKey = now.getFullYear() + '-' + now.getMonth();
  if (lastReset !== monthKey) {
    const { bills } = loadData();
    bills.forEach(b => b.paidThisMonth = false);
    saveData('bills', bills);
    localStorage.setItem(key, monthKey);
  }
}

// On load
window.addEventListener('DOMContentLoaded', () => {
  checkMonthlyReset();
  if (sessionStorage.getItem('rp_auth') === '1') {
    initApp();
  }
  document.getElementById('pw-input').focus();
});
</script>
